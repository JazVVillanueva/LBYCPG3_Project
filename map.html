<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniMonitor — Map</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/map.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid px-3">
            <a href="dashboard.html" class="navbar-logo ms-4">AniMonitor</a>

            <button class="navbar-toggler ms-auto" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarMenu"
                    aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-menu mx-auto mt-2 mt-lg-0">
                    <li><a href="dashboard.html">dashboard</a></li>
                    <li><a href="weather-forecast.html">forecast</a></li>
                    <li><a href="uv-heat.html">heat uv</a></li>
                    <li><a href="map.html" class="active">map</a></li>
                    <li><a href="admin-database.html">database</a></li>
                    <li><a href="about.html">about</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="map"></div>

    <div id="layer-panel" class="glass">
        <div class="panel-title">Weather Layer</div>

        <button class="layer-btn active" data-layer="temp_new" onclick="switchLayer(this)">
            <span class="layer-dot" style="background:#fc8014;"></span>
            Temperature
        </button>
        <button class="layer-btn" data-layer="precipitation_new" onclick="switchLayer(this)">
            <span class="layer-dot" style="background:#3d80e0;"></span>
            Precipitation
        </button>
        <button class="layer-btn" data-layer="clouds_new" onclick="switchLayer(this)">
            <span class="layer-dot" style="background:rgba(180,180,180,0.8);"></span>
            Cloud Cover
        </button>
        <button class="layer-btn" data-layer="wind_new" onclick="switchLayer(this)">
            <span class="layer-dot" style="background:#3faaff;"></span>
            Wind Speed
        </button>
    </div>

    <div id="legend" class="glass">
        <div class="legend-title" id="legend-title">Temperature</div>
        <div class="legend-bar bar-temp" id="legend-bar"></div>
        <div class="legend-labels" id="legend-labels">
            <span>-40°C</span><span>0°C</span><span>+40°C</span>
        </div>
        <div class="legend-unit" id="legend-unit">OWM temperature layer · °C</div>
    </div>

    <div id="info-badge" class="glass">
        📍 Philippines · Real-time weather overlay via OpenWeatherMap
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>

</body>
</html>
